apiVersion: v1
kind: Service
metadata:
  name: dim-master01
  namespace: docker-images-manager
  labels:
    app: docker-images-manager
    node: master01
spec:
  type: NodePort
  selector:
    app: docker-images-manager
    node: master01
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
      nodePort: 30801
---
apiVersion: v1
kind: Service
metadata:
  name: dim-node01
  namespace: docker-images-manager
  labels:
    app: docker-images-manager
    node: node01
spec:
  type: NodePort
  selector:
    app: docker-images-manager
    node: node01
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
      nodePort: 30802
---
apiVersion: v1
kind: Service
metadata:
  name: dim-node02
  namespace: docker-images-manager
  labels:
    app: docker-images-manager
    node: node02
spec:
  type: NodePort
  selector:
    app: docker-images-manager
    node: node02
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
      nodePort: 30803
