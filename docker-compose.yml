version: '3.8'

services:
  docker-images-manager:
    build: .
    image: harbor.apotos.com/docker-images-manager/docker-images-manager:latest
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - DEBUG=False
    restart: unless-stopped
